<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header / Navigation -->
    <header class="header">
      <div class="left-section">
        <div class="logo">
          <p>ShopMate</p>
        </div>
        <div class="search-box">
          <img src="search.svg" alt="Search Icon" class="search-icon" />
          <input
            class="search-input"
            type="text"
            placeholder="Search products..."
          />
        </div>
      </div>
      <div class="right-section">
        <nav class="header-nav-links">
          <a class="contact-link"
            ><img src="contact-icon.svg" alt="Contact"
          /></a>
          <a href="#" class="cart-link">
            <span class="cart-quantity">0</span>
            <img class="cart-icon" src="cart-icon.png" alt="Shopping cart" />
          </a>
        </nav>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <h1>Discover Amazing Deals</h1>
        <p>Shop the latest products at unbeatable prices.</p>
        <button class="hero-btn">Shop Now</button>
      </div>
    </section>

    <!-- Product Grid Section -->
    <section class="product-section">
      <h2>Featured Products</h2>
      <div class="product-grid"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer-copyright"></p>
    </footer>
    <script src="./index.js"></script>
  </body>
</html>
